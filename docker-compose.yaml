version: "1.0"

services:

  db:
    image: postgres:16
    container_name: bot_postgres
    restart: always
    environment:
      POSTGRES_DB: bot_db
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    container_name: schedule_bot
    restart: always
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: